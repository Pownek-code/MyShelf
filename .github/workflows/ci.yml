name: MyShelf Continuous Integration Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate-java-core:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code Graph
        uses: actions/checkout@v4

      - name: Initialize Java Development Kit Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Execute Compilation and Package Evaluation
        run: |
          cd myshelf-core
          mvn clean compile

  validate-python-brain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code Graph
        uses: actions/checkout@v4

      - name: Initialize Python Runtime Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Inflate Application Dependencies
        run: |
          cd myshelf-brain
          pip install -r requirements.txt

      - name: Execute Analytical Syntax Validation
        run: |
          cd myshelf-brain
          python -m compileall .